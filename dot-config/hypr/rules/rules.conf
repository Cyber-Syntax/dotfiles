##############################
###   WINDOWS RULES        ###
##############################
# Ref https://wiki.hyprland.org/Configuring/Window-Rules/
# Ref https://wiki.hyprland.org/Configuring/Workspace-Rules/
# "Smart gaps" / "No gaps when only"
# uncomment all if you wish to use that.
# workspace = w[tv1], gapsout:0, gapsin:0
# workspace = f[1], gapsout:0, gapsin:0
# windowrulev2 = bordersize 0, floating:0, onworkspace:w[tv1]
# windowrulev2 = rounding 0, floating:0, onworkspace:w[tv1]
# windowrulev2 = bordersize 0, floating:0, onworkspace:f[1]
# windowrulev2 = rounding 0, floating:0, onworkspace:f[1]

# Rules zed settings
        # class: dev.zed.Zed
        # title: Zed — Settings
        # initialClass: dev.zed.Zed
        # initialTitle: Zed — Settings
windowrule = float,title:^(Zed — Settings)$

# Ignore maximize requests from apps. You'll probably like this.
windowrulev2 = suppressevent maximize, class:.*

# Fix some dragging issues with XWayland
windowrulev2 = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0

windowrule = float,^(pavucontrol)$
windowrule = float,^(blueman-manager)$
windowrule = float,title:^(File Operation Progress)$
windowrulev2 = float, title:^(Open Folder)
windowrule = size %50, title:(Open Folder)
windowrule = float, title:(New Bookmarks — Mozilla Firefox)
windowrule = size %50, title:(Extension: (Tree Style Tab) - New Bookmarks — Mozilla Firefox)
# rules gnome seahorse
windowrule = float, org.gnome.seahorse.Application
windowrule = float, org.kde.polkit-kde-authentication-agent-1
# rule for idleinhibit for music, videos, nuclearapp
windowrule = idleinhibit focus, class:(mpv|vlc|nuclear|firefox|chromium|FreeTube)

##############################
### WORKSPACE ASSIGN       ###
##############################

# TESTING: Close gaps use fullscreen all the time on every workspace
#TODO: automate enable gaps when fullscreen 0
# Ref https://wiki.hypr.land/Configuring/Workspace-Rules/
workspace = r[1-10], rounding:false, decorate:false, gapsin:0, gapsout:0, border_size 0, match:workspace f[1]

# Assign browsers to workspace 1
windowrulev2 = workspace 1, class:^(firefox)$
windowrulev2 = workspace 1, class:^(Chromium-browser)$
windowrulev2 = workspace 1, class:^(Brave-browser)$
windowrulev2 = workspace 1, class:^(librewolf)$
windowrulev2 = workspace 1, class:^(zen)$
# workspace 2 coding
windowrulev2 = workspace 2, class:^(code)$
windowrulev2 = workspace 2, class:^(dev.zed.Zed)$
# workspace 3 rules
windowrulev2 = workspace 3, class:^(FreeTube)$
windowrulev2 = workspace 3, class:^(nuclear)$
# workspace 4 rules
windowrulev2 = workspace 4, class:^(superProductivity)$
#workspace 5 rules
windowrulev2 = workspace 5, class:^(Spotify)$
windowrulev2 = workspace 5, class:^(nuclear)$
