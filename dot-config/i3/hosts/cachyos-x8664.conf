# Desktop specific i3 configuration for cachy

exec keepassxc &
exec ~/Applications/super-productivity.AppImage &
#NOTE: make sure those apps not on the ~/.config/autostart
exec --no-startup-id ckb-next --background &
exec --no-startup-id syncthingtray-qt6 qt-widgets-gui --single-instance --wait &

# After two monitor on laptop
# workspaces now switched two monitor for that
# and this config now use one monitor setup

# Cycle groups
# bindsym Mod4+Tab workspace next
# bindsym Mod4+Shift+Tab workspace prev

# cycle 1 to 6
# Example: tab goes from 1 to 6, shift tab goes from 6 to one
# good for one monitor handling
# this also handle empty spaces so it is easy to open new space
# instead of bothering with win + 5
bindsym Mod4+Tab exec --no-startup-id ~/.config/i3/scripts/i3-cycle-forward.sh
bindsym Mod4+Shift+Tab exec --no-startup-id ~/.config/i3/scripts/i3-cycle-backward.sh

