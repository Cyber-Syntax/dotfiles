# Desktop specific i3 configuration for cachy

exec keepassxc &
# exec ~/Applications/super-productivity.AppImage &
#NOTE: make sure those apps not on the ~/.config/autostart
exec --no-startup-id ckb-next --background &
exec --no-startup-id syncthingtray-qt6 qt-widgets-gui --single-instance --wait &

#FIXME: session issue on i3wm + gdm
